scrape_configs:
  - job_name: 'agropro-monitoring'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 15s
    static_configs:
      - targets: ['192.168.222.121:8080']
        labels:
          app: 'agropro'
  - job_name: 'elasticsearch-monitoring'
    static_configs:
      - targets: ['elasticsearch_exporter:9114']